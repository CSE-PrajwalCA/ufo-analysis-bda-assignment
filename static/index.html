<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFO Sightings Analytics Dashboard</title>
    
    <!-- Plotly.js for charts -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="header">
            <h1>🛸 UFO Sightings Analytics Dashboard</h1>
            <p class="subtitle">Explore and analyze UFO sighting data interactively</p>
        </header>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="row">
                <!-- Country Filter -->
                <div class="col-md-3">
                    <label for="countryFilter">Country:</label>
                    <select id="countryFilter" class="form-control">
                        <option value="">All Countries</option>
                    </select>
                </div>

                <!-- State Filter -->
                <div class="col-md-3">
                    <label for="stateFilter">State/Province:</label>
                    <select id="stateFilter" class="form-control">
                        <option value="">All States</option>
                    </select>
                </div>

                <!-- Shape Filter -->
                <div class="col-md-3">
                    <label for="shapeFilter">UFO Shape:</label>
                    <select id="shapeFilter" class="form-control">
                        <option value="">All Shapes</option>
                    </select>
                </div>

                <!-- Year Range -->
                <div class="col-md-3">
                    <label for="yearRange">Year Range:</label>
                    <div class="year-range-inputs">
                        <input type="number" id="yearFrom" placeholder="From" min="1900" max="2100" value="1900">
                        <span> - </span>
                        <input type="number" id="yearTo" placeholder="To" min="1900" max="2100" value="2100">
                    </div>
                </div>
            </div>

            <!-- Additional Filters Row -->
            <div class="row mt-3">
                <!-- Duration Range -->
                <div class="col-md-6">
                    <label for="durationRange">Duration (seconds):</label>
                    <div class="duration-inputs">
                        <input type="number" id="durationMin" placeholder="Min" min="0" value="0">
                        <span> - </span>
                        <input type="number" id="durationMax" placeholder="Max" min="0" value="999999">
                    </div>
                </div>

                <!-- Buttons -->
                <div class="col-md-6 text-end">
                    <button id="applyFiltersBtn" class="btn btn-primary">Apply Filters</button>
                    <button id="resetFiltersBtn" class="btn btn-secondary">Reset</button>
                    <button id="exportCsvBtn" class="btn btn-success">📥 Export CSV</button>
                </div>
            </div>
        </section>

        <!-- Summary Stats Section -->
        <section class="stats-section">
            <div class="row">
                <div class="col-md-3">
                    <div class="stat-box">
                        <span class="stat-label">Total Sightings</span>
                        <span class="stat-value" id="statTotalSightings">0</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-box">
                        <span class="stat-label">Avg Duration (sec)</span>
                        <span class="stat-value" id="statAvgDuration">0</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-box">
                        <span class="stat-label">Unique Countries</span>
                        <span class="stat-value" id="statCountries">0</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-box">
                        <span class="stat-label">Unique Shapes</span>
                        <span class="stat-value" id="statShapes">0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="charts-section">
            <div class="row">
                <!-- Sightings per Year -->
                <div class="col-md-6 chart-container">
                    <div id="chartSightingsPerYear" class="chart"></div>
                </div>

                <!-- Sightings by Shape -->
                <div class="col-md-6 chart-container">
                    <div id="chartSightingsByShape" class="chart"></div>
                </div>

                <!-- Sightings by Country -->
                <div class="col-md-6 chart-container">
                    <div id="chartSightingsByCountry" class="chart"></div>
                </div>

                <!-- Monthly Trend -->
                <div class="col-md-6 chart-container">
                    <div id="chartMonthlyTrend" class="chart"></div>
                </div>

                <!-- Duration Distribution -->
                <div class="col-md-6 chart-container">
                    <div id="chartDurationDistribution" class="chart"></div>
                </div>

                <!-- Geo Map -->
                <div class="col-md-6 chart-container">
                    <div id="chartGeoMap" class="chart"></div>
                </div>
            </div>
        </section>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <p>Loading data...</p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>UFO Sightings Analytics | Data Analysis Project | Built with Flask, MongoDB, and Plotly</p>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dashboard JS -->
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
